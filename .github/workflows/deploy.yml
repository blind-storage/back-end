name: CI/CD Backend

on:
  push:
    branches: ['**']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/blind-storage/back-end

jobs:
  # ── Lint: runs on every push ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout back-end
        uses: actions/checkout@v4
        with:
          path: back-end

      - name: Checkout types
        uses: actions/checkout@v4
        with:
          repository: blind-storage/types
          path: types
          ssh-key: ${{ secrets.TYPES_DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: back-end/package-lock.json

      - name: Build types
        run: cd types && npm ci && npm run build

      - name: Install dependencies
        working-directory: back-end
        run: npm ci

      - name: Lint
        working-directory: back-end
        run: npm run lint

  # ── Tests: runs only on push to main ────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout back-end
        uses: actions/checkout@v4
        with:
          path: back-end

      - name: Checkout types
        uses: actions/checkout@v4
        with:
          repository: blind-storage/types
          path: types
          ssh-key: ${{ secrets.TYPES_DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: back-end/package-lock.json

      - name: Build types
        run: cd types && npm ci && npm run build

      - name: Install dependencies
        working-directory: back-end
        run: npm ci

      - name: Test
        working-directory: back-end
        run: npm test

  # ── Build & push: runs on push to main after lint + test ────────────────────
  build-and-push:
    name: Build & Push Image
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout back-end
        uses: actions/checkout@v4
        with:
          path: back-end

      - name: Checkout types
        uses: actions/checkout@v4
        with:
          repository: blind-storage/types
          path: types
          ssh-key: ${{ secrets.TYPES_DEPLOY_KEY }}

      - name: Build types
        run: cd types && npm ci && npm run build

      - name: Copy types into build context
        run: cp -r types back-end/types

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: back-end
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── [DEBUG] SSH test: runs on every push — remove once SSH works ─────────────
  test-ssh:
    name: "[DEBUG] Test SSH"
    runs-on: ubuntu-latest
    steps:
      - name: Test SSH connection
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes \
              -i ~/.ssh/deploy_key -6 \
              "${SSH_USER}@[${SSH_HOST}]" \
              'echo "SSH OK: $(hostname)"'

  # ── Deploy: runs after successful build ─────────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes \
              -i ~/.ssh/deploy_key -6 \
              "${SSH_USER}@[${SSH_HOST}]" \
              '/opt/blind-storage/scripts/deploy.sh backend'
