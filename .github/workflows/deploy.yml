name: CI/CD Backend

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/blind-storage/back-end

jobs:
  # ── Lint: runs on every push ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout types
        uses: actions/checkout@v4
        with:
          repository: blind-storage/types
          path: types
          ssh-key: ${{ secrets.TYPES_DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build types
        run: cd types && npm ci && npm run build

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # ── Tests: runs on PR to main or push to main ───────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Checkout types
        uses: actions/checkout@v4
        with:
          repository: blind-storage/types
          path: types
          ssh-key: ${{ secrets.TYPES_DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build types
        run: cd types && npm ci && npm run build

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

  # ── Build & push: runs on push to main after lint + test ────────────────────
  build-and-push:
    name: Build & Push Image
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout types
        uses: actions/checkout@v4
        with:
          repository: blind-storage/types
          path: types
          ssh-key: ${{ secrets.TYPES_DEPLOY_KEY }}

      - name: Build types
        run: cd types && npm ci && npm run build

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy: runs after successful build ─────────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /opt/blind-storage/scripts/deploy.sh backend
