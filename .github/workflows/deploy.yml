name: CI/CD Backend

on:
  push:
    branches: ['**']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/blind-storage/back-end

jobs:
  # ── Lint: runs on every push ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout back-end
        uses: actions/checkout@v4
        with:
          path: back-end

      - name: Checkout types
        uses: actions/checkout@v4
        with:
          repository: blind-storage/types
          path: types
          ssh-key: ${{ secrets.TYPES_DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: back-end/package-lock.json

      - name: Build types
        run: cd types && npm ci && npm run build

      - name: Install dependencies
        working-directory: back-end
        run: npm ci

      - name: Lint
        working-directory: back-end
        run: npm run lint

  # ── Tests: runs only on push to main ────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout back-end
        uses: actions/checkout@v4
        with:
          path: back-end

      - name: Checkout types
        uses: actions/checkout@v4
        with:
          repository: blind-storage/types
          path: types
          ssh-key: ${{ secrets.TYPES_DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: back-end/package-lock.json

      - name: Build types
        run: cd types && npm ci && npm run build

      - name: Install dependencies
        working-directory: back-end
        run: npm ci

      - name: Test
        working-directory: back-end
        run: npm test

  # ── Build & push: runs on push to main after lint + test ────────────────────
  build-and-push:
    name: Build & Push Image
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout back-end
        uses: actions/checkout@v4
        with:
          path: back-end

      - name: Checkout types
        uses: actions/checkout@v4
        with:
          repository: blind-storage/types
          path: types
          ssh-key: ${{ secrets.TYPES_DEPLOY_KEY }}

      - name: Build types
        run: cd types && npm ci && npm run build

      - name: Copy types into build context
        run: cp -r types back-end/types

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (runner)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata (migrate)
        id: meta-migrate
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=migrate-sha-
            type=raw,value=migrate-latest,enable={{is_default_branch}}

      - name: Build and push (runner)
        id: push
        uses: docker/build-push-action@v5
        with:
          context: back-end
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (migrate)
        uses: docker/build-push-action@v5
        with:
          context: back-end
          target: migrate
          push: true
          tags: ${{ steps.meta-migrate.outputs.tags }}
          labels: ${{ steps.meta-migrate.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max



  # ── Deploy: runs on the server (self-hosted runner) ─────────────────────────
  deploy:
    name: Deploy to Server
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment: production

    steps:
      - name: Deploy
        run: /opt/blind-storage/scripts/deploy.sh backend
